name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Locale parity
        run: node scripts/check-locale-parity.mjs

      - name: Updater pubkey
        run: node scripts/verify-updater-pubkey.mjs

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            cmake \
            clang \
            libclang-dev

      - name: Prepare LLM sidecar
        run: bash ../scripts/prepare-llm-sidecar.sh

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            cache_key: windows-gpu
          - platform: macos-latest
            cache_key: macos
          - platform: ubuntu-latest
            cache_key: linux
    runs-on: ${{ matrix.platform }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.15"
      CMAKE_OSX_DEPLOYMENT_TARGET: "10.15"
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            cmake \
            clang \
            libclang-dev

      - name: Cache Vulkan SDK (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v4
        id: vulkan_sdk
        with:
          path: C:\VulkanSDK
          key: vulkan-sdk-1.4.350.0-windows

      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows-latest' && steps.vulkan_sdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          choco install vulkan-sdk ninja -y --no-progress
          $sdk = (Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1).FullName
          if (-not $sdk) { throw "Vulkan SDK install did not populate C:\VulkanSDK" }

      - name: Configure Vulkan SDK env (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $sdk = (Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1).FullName
          $bin = Join-Path $sdk "Bin"
          "VULKAN_SDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          & (Join-Path $bin "glslc.exe") --version

      - name: Setup MSVC
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure Windows GPU build paths
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          git config --system core.longpaths true
          subst X: $env:GITHUB_WORKSPACE
          "CARGO_TARGET_DIR=X:\ct" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CMAKE_OBJECT_PATH_MAX=1024" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: calliop-${{ matrix.cache_key }}
          cache-all-crates: true
          save-if: ${{ github.ref_type == 'tag' || github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set macOS C++ deployment target
        if: matrix.platform == 'macos-latest'
        run: echo "CXXFLAGS=-mmacosx-version-min=10.15" >> "$GITHUB_ENV"

      - name: Build Tauri app (Windows GPU)
        if: matrix.platform == 'windows-latest'
        run: pnpm tauri build --features gpu --config src-tauri/tauri.ci.conf.json

      - name: Build Tauri app
        if: matrix.platform != 'windows-latest'
        run: pnpm tauri build --config src-tauri/tauri.ci.conf.json
