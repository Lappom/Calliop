name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            cmake \
            clang \
            libclang-dev

      - name: Prepare LLM sidecar
        run: bash ../scripts/prepare-llm-sidecar.sh

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          - platform: ubuntu-latest
    runs-on: ${{ matrix.platform }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.15"
      CMAKE_OSX_DEPLOYMENT_TARGET: "10.15"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            cmake \
            clang \
            libclang-dev

      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install vulkan-sdk -y --no-progress
          $sdk = (Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1).FullName
          $bin = Join-Path $sdk "Bin"
          "VULKAN_SDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $env:VULKAN_SDK = $sdk
          $env:PATH = "$bin;$env:PATH"
          & (Join-Path $bin "glslc.exe") --version

      - name: Prepare LLM sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: ./scripts/prepare-llm-sidecar.ps1

      - name: Prepare LLM sidecar (Linux)
        if: matrix.platform == 'ubuntu-latest'
        working-directory: src-tauri
        run: bash ../scripts/prepare-llm-sidecar.sh

      - name: Prepare LLM sidecar (macOS)
        if: matrix.platform == 'macos-latest'
        working-directory: src-tauri
        run: bash ../scripts/prepare-llm-sidecar.sh

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set macOS C++ deployment target
        if: matrix.platform == 'macos-latest'
        run: echo "CXXFLAGS=-mmacosx-version-min=10.15" >> "$GITHUB_ENV"

      - name: Build Tauri app (Windows GPU)
        if: matrix.platform == 'windows-latest'
        run: pnpm tauri build --features gpu --config src-tauri/tauri.ci.conf.json

      - name: Build Tauri app
        if: matrix.platform != 'windows-latest'
        run: pnpm tauri build --config src-tauri/tauri.ci.conf.json
