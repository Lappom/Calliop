name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            build_args: "--features gpu"
            cache_key: windows-gpu
    runs-on: ${{ matrix.platform }}
    env:
      CMAKE_OBJECT_PATH_MAX: "1024"
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Vulkan SDK (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v5
        id: vulkan_sdk
        with:
          path: C:\VulkanSDK
          key: vulkan-sdk-1.4.350.0-windows

      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows-latest' && steps.vulkan_sdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          choco install vulkan-sdk ninja -y --no-progress --version=1.4.350.0
          $sdk = (Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1).FullName
          if (-not $sdk) { throw "Vulkan SDK install did not populate C:\VulkanSDK" }

      - name: Configure Vulkan SDK env (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $sdk = (Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1).FullName
          $bin = Join-Path $sdk "Bin"
          "VULKAN_SDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          & (Join-Path $bin "glslc.exe") --version

      - name: Setup MSVC
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure Windows GPU build paths
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          git config --system core.longpaths true
          subst X: $env:GITHUB_WORKSPACE
          "CARGO_TARGET_DIR=X:\ct" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CMAKE_OBJECT_PATH_MAX=1024" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: calliop-${{ matrix.cache_key }}
          cache-all-crates: true
          save-if: ${{ github.ref_type == 'tag' || github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify updater signing pubkey
        run: node scripts/verify-updater-pubkey.mjs

      - name: Load release notes
        id: release_notes
        shell: bash
        run: |
          {
            echo "body<<EOF"
            cat "releases/${{ github.ref_name }}.md"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Calliop ${{ github.ref_name }}
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          args: ${{ matrix.build_args }}
